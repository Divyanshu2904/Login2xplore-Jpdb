<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management - JPDB Assignment</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <!-- JPDB Commons Library -->
    <script src="http://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
        <div class="card glass-card shadow-lg p-4 p-md-5 w-100" style="max-width: 700px;">
            <h2 class="text-center mb-4 form-title">Employee Management Form</h2>
            
            <!-- Alert Container for Messages -->
            <div id="alertContainer"></div>

            <form id="empForm" method="post" novalidate>
                <div class="form-group mb-3 position-relative">
                    <label for="empId" class="form-label">Employee ID</label>
                    <input type="text" class="form-control" name="empId" id="empId" placeholder="Enter Employee ID (e.g. EMP01)" required>
                    <div class="invalid-feedback">Employee ID is required.</div>
                    <div class="form-text text-muted">Enter ID and press Tab to fetch or create a new employee.</div>
                </div>

                <div class="form-group mb-3">
                    <label for="empName" class="form-label">Employee Name</label>
                    <input type="text" class="form-control" name="empName" id="empName" placeholder="Enter Employee Name" disabled required>
                    <div class="invalid-feedback">Employee Name is required.</div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 form-group mb-3">
                        <label for="empSalary" class="form-label">Basic Salary (₹)</label>
                        <input type="number" class="form-control auto-calc" name="empSalary" id="empSalary" placeholder="Basic Salary" min="0" disabled required>
                        <div class="invalid-feedback">Basic Salary is required.</div>
                    </div>
                    <div class="col-md-6 form-group mb-3">
                        <label for="empHRA" class="form-label">HRA (₹)</label>
                        <input type="number" class="form-control auto-calc" name="empHRA" id="empHRA" placeholder="HRA" min="0" disabled required>
                        <div class="invalid-feedback">HRA is required.</div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 form-group mb-3">
                        <label for="empDA" class="form-label">DA (₹)</label>
                        <input type="number" class="form-control auto-calc" name="empDA" id="empDA" placeholder="DA" min="0" disabled required>
                        <div class="invalid-feedback">DA is required.</div>
                    </div>
                    <div class="col-md-6 form-group mb-3">
                        <label for="empDeduct" class="form-label">Deduction (₹)</label>
                        <input type="number" class="form-control auto-calc" name="empDeduct" id="empDeduct" placeholder="Deductions" min="0" disabled required>
                        <div class="invalid-feedback">Deduction is required.</div>
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label for="empNetSalary" class="form-label fw-bold">Net Salary (₹) <span class="badge bg-info text-dark ms-2">Auto-calculated</span></label>
                    <input type="number" class="form-control bg-light fw-bold text-success" name="empNetSalary" id="empNetSalary" placeholder="Net Salary" readonly disabled>
                </div>
                
                <div class="text-center mt-2">
                    <button type="button" class="btn btn-primary btn-custom" id="empSave" onclick="saveEmployee()" disabled>
                        <span class="btn-text">Save</span>
                        <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    </button>
                    <button type="button" class="btn btn-warning btn-custom text-white" id="empChange" onclick="changeEmployee()" disabled>
                        <span class="btn-text">Change</span>
                        <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    </button>
                    <button type="button" class="btn btn-secondary btn-custom" id="empReset" onclick="resetForm()">Reset</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Bootstrap JS for Toast/Alert dismiss -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
