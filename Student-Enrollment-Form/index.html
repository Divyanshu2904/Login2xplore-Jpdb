<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment Form - JPDB Assignment</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <!-- JPDB Commons Library -->
    <script src="http://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">
        <div class="card glass-card shadow-lg p-4 p-md-5 w-100" style="max-width: 700px;">
            <h2 class="text-center mb-4 form-title">Student Enrollment Form</h2>
            
            <div id="alertContainer"></div>

            <form id="studentForm" method="post" novalidate>
                <div class="form-group mb-3 position-relative">
                    <label for="rollNo" class="form-label">Roll-No</label>
                    <input type="text" class="form-control" name="rollNo" id="rollNo" placeholder="Enter Roll No (e.g. STU101)" required>
                    <div class="invalid-feedback">Roll-No is required.</div>
                    <div class="form-text text-muted">Enter Roll-No and press Tab to fetch or create a new student.</div>
                </div>

                <div class="form-group mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="fullName" id="fullName" placeholder="Enter Full Name" disabled required>
                    <div class="invalid-feedback">Full Name is required.</div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 form-group mb-3">
                        <label for="class" class="form-label">Class</label>
                        <input type="text" class="form-control" name="class" id="class" placeholder="Enter Class (e.g. 10th)" disabled required>
                        <div class="invalid-feedback">Class is required.</div>
                    </div>
                    <div class="col-md-6 form-group mb-3">
                        <label for="birthDate" class="form-label">Birth Date</label>
                        <input type="date" class="form-control" name="birthDate" id="birthDate" disabled required>
                        <div class="invalid-feedback">Birth Date is required.</div>
                    </div>
                </div>
                
                <div class="form-group mb-3">
                    <label for="address" class="form-label">Address</label>
                    <input type="text" class="form-control" name="address" id="address" placeholder="Enter Address" disabled required>
                    <div class="invalid-feedback">Address is required.</div>
                </div>
                
                <div class="form-group mb-4">
                    <label for="enrollmentDate" class="form-label">Enrollment Date</label>
                    <input type="date" class="form-control" name="enrollmentDate" id="enrollmentDate" disabled required>
                    <div class="invalid-feedback">Enrollment Date is required.</div>
                </div>

                <div class="text-center mt-2">
                    <button type="button" class="btn btn-primary btn-custom" id="btnSave" onclick="saveStudent()" disabled>
                        <span class="btn-text">Save</span>
                        <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    </button>
                    <button type="button" class="btn btn-warning btn-custom text-white" id="btnUpdate" onclick="updateStudent()" disabled>
                        <span class="btn-text">Update</span>
                        <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    </button>
                    <button type="button" class="btn btn-secondary btn-custom" id="btnReset" onclick="resetForm()">Reset</button>
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
